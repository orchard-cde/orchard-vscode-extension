name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49c5eb4781f51c69518a17031d3d11ec7b8d0c0e  # v4.4.0
        with:
          node-version: 'lts/*'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run compile
