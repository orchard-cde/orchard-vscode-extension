name: GitLab Mirror

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab "https://${{ secrets.GITLAB_MIRROR_USER }}:${{ secrets.GITLAB_MIRROR_TOKEN }}@gitlab.com/orchard-cde/orchard-vscode-extension.git"
          git push gitlab HEAD:main
